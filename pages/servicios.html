<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Servicios — TechSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="navbar-container"></div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <h1><i class="bi bi-grid me-2"></i>Catálogo de Servicios</h1>
      <p>Encuentra la solución tecnológica perfecta para tu empresa</p>
    </div>
  </div>

  <!-- BREADCRUMB -->
  <div class="breadcrumb-custom">
    <div class="container">
      <a href="../index.html">Inicio</a>
      <span class="separator">›</span>
      <strong>Servicios</strong>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <section class="section">
    <div class="container">
      <!-- FILTERS BAR -->
      <div class="filters-bar d-flex flex-wrap gap-3 align-items-center">
        <div class="flex-grow-1">
          <input type="text" id="searchInput" class="form-control" 
                 placeholder="🔍 Buscar servicios..." 
                 oninput="applyFilters()">
        </div>
        <select id="categoryFilter" class="form-select" style="max-width:200px" onchange="applyFilters()">
          <option value="all">Todas las categorías</option>
          <option value="Web">Desarrollo Web</option>
          <option value="Mobile">Apps Móviles</option>
          <option value="Cloud">Cloud</option>
          <option value="DevOps">DevOps</option>
          <option value="IA">IA & ML</option>
          <option value="Security">Seguridad</option>
        </select>
        <select id="sortFilter" class="form-select" style="max-width:180px" onchange="applyFilters()">
          <option value="">Ordenar por</option>
          <option value="precio-asc">Precio: Menor</option>
          <option value="precio-desc">Precio: Mayor</option>
          <option value="rating">Mejor Valorado</option>
          <option value="reciente">Más Reciente</option>
        </select>
        <span class="results-count" id="resultsCount">— resultados</span>
      </div>

      <!-- SERVICES GRID -->
      <div class="row" id="services-grid">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>

      <!-- PAGINATION -->
      <nav id="pagination-container" class="mt-4"></nav>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // --- Variables de paginación ---
    const ITEMS_PER_PAGE = 6;
    let currentPage = 1;
    let filteredServices = [];

    /**
     * Aplica filtros de búsqueda, categoría y ordenamiento
     * Luego renderiza los resultados con paginación
     */
    function applyFilters() {
      const query = document.getElementById("searchInput").value;
      const category = document.getElementById("categoryFilter").value;
      const sort = document.getElementById("sortFilter").value;

      // Filtrar por búsqueda
      let results = app.searchServices(query);

      // Filtrar por categoría
      if (category && category !== "all") {
        results = results.filter(
          (s) => s.categoria.toLowerCase() === category.toLowerCase()
        );
      }

      // Ordenar
      if (sort) {
        results = app.sortServices(results, sort);
      }

      filteredServices = results;
      currentPage = 1;
      renderResults();
    }

    /**
     * Renderiza los resultados paginados
     */
    function renderResults() {
      const container = document.getElementById("services-grid");
      const countEl = document.getElementById("resultsCount");

      // Actualizar contador
      countEl.textContent = `${filteredServices.length} resultado${filteredServices.length !== 1 ? "s" : ""}`;

      // Calcular paginación
      const totalPages = Math.ceil(filteredServices.length / ITEMS_PER_PAGE);
      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const pageServices = filteredServices.slice(start, start + ITEMS_PER_PAGE);

      if (pageServices.length > 0) {
        container.innerHTML = pageServices
          .map((s) => renderServiceCard(s, app))
          .join("");
      } else {
        container.innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              <div class="empty-state-icon">🔍</div>
              <h4>No se encontraron servicios</h4>
              <p>Intenta con otros términos de búsqueda o cambia los filtros</p>
              <button class="btn btn-primary-custom" onclick="clearFilters()">Limpiar filtros</button>
            </div>
          </div>`;
      }

      // Renderizar paginación
      renderPagination(totalPages);
    }

    /**
     * Renderiza los controles de paginación
     * @param {number} totalPages - Total de páginas
     */
    function renderPagination(totalPages) {
      const container = document.getElementById("pagination-container");

      if (totalPages <= 1) {
        container.innerHTML = "";
        return;
      }

      let html = '<ul class="pagination justify-content-center">';
      html += `<li class="page-item ${currentPage === 1 ? "disabled" : ""}">
                <a class="page-link" href="#" onclick="goToPage(${currentPage - 1});return false">‹</a>
               </li>`;

      for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? "active" : ""}">
                  <a class="page-link" href="#" onclick="goToPage(${i});return false">${i}</a>
                 </li>`;
      }

      html += `<li class="page-item ${currentPage === totalPages ? "disabled" : ""}">
                <a class="page-link" href="#" onclick="goToPage(${currentPage + 1});return false">›</a>
               </li>`;
      html += "</ul>";
      container.innerHTML = html;
    }

    /**
     * Navega a una página específica
     * @param {number} page
     */
    function goToPage(page) {
      const totalPages = Math.ceil(filteredServices.length / ITEMS_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderResults();
      window.scrollTo({ top: 300, behavior: "smooth" });
    }

    /**
     * Limpia todos los filtros
     */
    function clearFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("categoryFilter").value = "all";
      document.getElementById("sortFilter").value = "";
      applyFilters();
    }

    // --- INICIALIZACIÓN ---
    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("navbar-container").innerHTML = renderNavbar("servicios");
      document.getElementById("footer-container").innerHTML = renderFooter();

      await app.loadServices(false);
      app.updateFavCounter();

      // Verificar si hay parámetro de categoría en la URL
      const params = new URLSearchParams(window.location.search);
      const catParam = params.get("categoria");
      if (catParam) {
        document.getElementById("categoryFilter").value = catParam;
      }

      filteredServices = app.services;
      applyFilters();
    });
  </script>
</body>
</html>
