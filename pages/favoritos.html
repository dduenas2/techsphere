<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Favoritos — TechSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-header">
    <div class="container">
      <h1><i class="bi bi-heart me-2"></i>Mis Favoritos</h1>
      <p>Servicios guardados para revisar más tarde · <span id="fav-total">0</span> servicios guardados</p>
    </div>
  </div>

  <div class="breadcrumb-custom">
    <div class="container">
      <a href="../index.html">Inicio</a>
      <span class="separator">›</span>
      <strong>Favoritos</strong>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <!-- INFO ALERT -->
      <div class="alert alert-info d-flex align-items-center gap-2 mb-4" role="alert" style="border-radius:var(--radius-sm)">
        <i class="bi bi-info-circle-fill"></i>
        Tus favoritos se guardan localmente en tu navegador usando <strong>localStorage</strong>. No se perderán al cerrar la pestaña.
      </div>

      <!-- FAVORITES LIST -->
      <div id="favorites-list" class="d-flex flex-column gap-3">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>

      <!-- SUMMARY -->
      <div id="fav-summary" class="mt-4 p-4 bg-white rounded-3 border d-none">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
          <div>
            <div style="font-size:0.85rem;color:var(--text-muted)">Total en favoritos</div>
            <div style="font-size:1.5rem;font-weight:800" id="fav-summary-count">0 servicios</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-danger btn-sm" onclick="handleClearAll()">
              <i class="bi bi-trash me-1"></i>Limpiar favoritos
            </button>
            <a href="servicios.html" class="btn btn-primary-custom">
              Explorar más servicios <i class="bi bi-arrow-right ms-1"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    /**
     * Renderiza la lista completa de favoritos
     */
    function renderFavorites() {
      const container = document.getElementById("favorites-list");
      const summary = document.getElementById("fav-summary");
      const totalEl = document.getElementById("fav-total");
      const summaryCount = document.getElementById("fav-summary-count");

      // Obtener servicios favoritos completos
      const favServices = app.favorites
        .map((id) => app.getServiceById(id))
        .filter((s) => s !== null);

      totalEl.textContent = favServices.length;
      summaryCount.textContent = `${favServices.length} servicio${favServices.length !== 1 ? "s" : ""}`;

      if (favServices.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="bi bi-heart"></i></div>
            <h4>No tienes favoritos aún</h4>
            <p>Explora nuestro catálogo y guarda los servicios que más te interesen</p>
            <a href="servicios.html" class="btn btn-primary-custom">
              <i class="bi bi-grid me-1"></i>Explorar Servicios
            </a>
          </div>`;
        summary.classList.add("d-none");
        return;
      }

      summary.classList.remove("d-none");

      container.innerHTML = favServices.map((service) => {
        const tagClass = getCategoryTagClass(service.categoria);
        return `
          <div class="fav-item d-flex align-items-center gap-3 flex-wrap" id="fav-item-${service.id}">
            <img src="${service.imagen}" alt="${service.nombre}" class="fav-item-image"
                 onerror="this.src='https://placehold.co/80x80/1E293B/94A3B8?text=TS'">
            <div class="flex-grow-1">
              <div class="fw-bold mb-1">${service.nombre}</div>
              <div style="font-size:0.8rem;color:var(--text-secondary)">${service.descripcionCorta}</div>
              <div class="mt-2">
                <span class="tag ${tagClass}">${service.categoria}</span>
                ${service.tecnologias.slice(0, 2).map((t) => `<span class="tag tag-green">${t}</span>`).join("")}
              </div>
            </div>
            <div class="text-end" style="min-width:110px">
              <div class="fav-item-price">${formatPrice(service.precio)}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">${service.tipoPrecio}</div>
            </div>
            <div class="d-flex gap-2">
              <a href="detalle.html?id=${service.id}" class="btn btn-primary-custom btn-sm">Ver detalle</a>
              <button class="btn btn-sm" style="background:#FEE2E2;color:#EF4444" 
                      onclick="handleRemoveFav(${service.id})">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>`;
      }).join("");
    }

    /**
     * Elimina un favorito individual con animación
     * @param {number} serviceId
     */
    function handleRemoveFav(serviceId) {
      const element = document.getElementById(`fav-item-${serviceId}`);
      if (element) {
        element.style.transition = "all 0.3s ease";
        element.style.opacity = "0";
        element.style.transform = "translateX(20px)";
      }

      setTimeout(() => {
        app.removeFavorite(serviceId);
        renderFavorites();
        showToast("Servicio removido de favoritos", "info");
      }, 300);
    }

    /**
     * Limpia todos los favoritos con confirmación
     */
    function handleClearAll() {
      if (confirm("¿Estás seguro de eliminar todos los favoritos? Esta acción no se puede deshacer.")) {
        app.clearFavorites();
        renderFavorites();
        showToast("Todos los favoritos han sido eliminados", "info");
      }
    }

    // --- INICIALIZACIÓN ---
    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("navbar-container").innerHTML = renderNavbar("favoritos");
      document.getElementById("footer-container").innerHTML = renderFooter();

      await app.loadServices(false);
      app.updateFavCounter();
      renderFavorites();
    });
  </script>
</body>
</html>
